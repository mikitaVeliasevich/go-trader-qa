# Live-reload gtqa-server on Go file changes.
# Install: go install github.com/air-verse/air@latest
# Run: air   (or: make dev)

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/gtqa-server ./cmd/gtqa-server"
  bin = "./tmp/gtqa-server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "bin", "reports", "web", "designs", "testdata", "vendor", ".git"]
  delay = 500
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
